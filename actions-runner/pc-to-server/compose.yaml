services:
  runner:
    image: ghcr.io/actions/actions-runner:latest
    container_name: pc-to-server-github-runner
    restart: unless-stopped
    working_dir: /runner
    environment:
      RUNNER_URL: https://github.com/nicsaw/pc-to-server
      RUNNER_TOKEN: ${RUNNER_TOKEN:?Set RUNNER_TOKEN in .env}
      RUNNER_NAME: ${RUNNER_NAME:-pc-to-server-local}
      RUNNER_LABELS: pc-to-server
    volumes:
      - runner-data:/runner
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - /bin/bash
      - -lc
      - |
        set -euo pipefail

        if [ ! -x ./config.sh ]; then
          cp -a /home/runner/. /runner/
        fi

        if [ ! -f .runner ]; then
          ./config.sh \
            --unattended \
            --url "$$RUNNER_URL" \
            --token "$$RUNNER_TOKEN" \
            --name "$$RUNNER_NAME" \
            --labels "$$RUNNER_LABELS" \
            --work _work \
            --replace
        fi

        exec ./run.sh

volumes:
  runner-data:
