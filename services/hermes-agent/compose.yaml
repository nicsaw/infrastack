services:
  hermes:
    image: nousresearch/hermes-agent
    container_name: hermes-agent
    restart: unless-stopped
    command: gateway run
    ports:
      - "8642:8642" # gateway API
      - "9119:9119" # dashboard
    volumes:
      - ./data:/opt/data
    environment:
      - API_SERVER_ENABLED=true
      - API_SERVER_KEY=${HERMES_API_SERVER_KEY}
      - HERMES_DASHBOARD=1
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
