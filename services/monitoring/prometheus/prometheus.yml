# https://prometheus.io/docs/prometheus/latest/configuration/configuration

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

storage:
  tsdb:
    retention:
      time: 15d
