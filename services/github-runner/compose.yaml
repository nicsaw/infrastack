x-runner: &runner
  image: myoung34/github-runner
  restart: unless-stopped
  environment: &runner-environment
    ACCESS_TOKEN: ${GH_RUNNER_PAT}
    REPO_URL: ${GH_RUNNER_REPO_URL:-https://github.com/nicsaw/spearhead}
    RUNNER_SCOPE: repo
    LABELS: self-hosted,linux,homelab
    DISABLE_AUTO_UPDATE: "true"
    RUNNER_TOOL_CACHE: /opt/hostedtoolcache
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

# Cache volumes are SHARED across runners (pnpm/npm/cargo/.cache are content-
# addressed or rely on their own lockfiles for concurrent access). A PR scheduled
# on runner 2 hits the cache that runner 1 just warmed. Only `_work` and
# `toolcache` semantics differ: `_work` stays per-runner so concurrent jobs do
# not clobber each other's checkouts; `toolcache` was already shared.
services:
  github-runner:
    <<: *runner
    container_name: github-runner
    environment:
      <<: *runner-environment
      RUNNER_NAME: ${GH_RUNNER_NAME:-homelab-runner}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - github-runner-work:/_work
      - github-runner-cache:/home/runner/.cache
      - github-runner-npm:/home/runner/.npm
      - github-runner-cargo:/home/runner/.cargo
      - github-runner-pnpm-store:/home/runner/.local/share/pnpm/store
      - github-runner-toolcache:/opt/hostedtoolcache

  github-runner-2:
    <<: *runner
    container_name: github-runner-2
    environment:
      <<: *runner-environment
      RUNNER_NAME: homelab-runner-2
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - github-runner-2-work:/_work
      - github-runner-cache:/home/runner/.cache
      - github-runner-npm:/home/runner/.npm
      - github-runner-cargo:/home/runner/.cargo
      - github-runner-pnpm-store:/home/runner/.local/share/pnpm/store
      - github-runner-toolcache:/opt/hostedtoolcache

volumes:
  github-runner-work:
  github-runner-2-work:
  github-runner-cache:
  github-runner-npm:
  github-runner-cargo:
  github-runner-pnpm-store:
  github-runner-toolcache:
