services:
  camofox-browser:
    image: ghcr.io/redf0x1/camofox-browser
    container_name: camofox-browser
    restart: unless-stopped
    network_mode: "service:hermes-agent"
    depends_on:
      - hermes-agent
    environment:
      - CAMOFOX_PORT=9377
      - CAMOFOX_CRASH_REPORT_ENABLED=${CAMOFOX_CRASH_REPORT_ENABLED:-false}
      - ENABLE_VNC=1
      - VNC_BIND=0.0.0.0
      - VNC_RESOLUTION=1920x1080
    volumes:
      - ./data:/root/.camofox
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9377/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
